schema_version: 1

simulation:
  time_step: 60
  end_time: 86400
  shortest_paths_n: 5
  time_value_of_money: 10.0
  use_specific_time_values: false
  carbon_rate: 0.5
  multipliers: { ship: 1.0, train: 1.0, truck: 1.0 }
  ship:  { speed: 20.0, fuel_type: HFO,    fuel_rate: 0.20, containers: 2000, risk: 0.05, time_value: 5.0,  use_network: true }
  train: { speed: 60.0, fuel_type: Diesel, fuel_rate: 0.40, containers: 500,  risk: 0.02, time_value: 10.0, use_network: true }
  truck: { speed: 80.0, fuel_type: Diesel, fuel_rate: 0.08, containers: 2,    risk: 0.01, time_value: 15.0, use_network: true }
  fuel_types:
    Diesel:   { energy: 35.8, carbon: 2.64, price: 1.20 }
    HFO:      { energy: 40.5, carbon: 3.114, price: 0.80 }
    Electric: { energy: 1.0,  carbon: 0.0,  price: 0.12 }
  dwell_time:
    method: normal
    parameters: { mean: 172800, std_dev: 43200 }

output:
  directory: ./results
  formats: [json, csv]
  container_tracking: true

fleet:
  trains: { file: "fleets/trains.json", inline: [] }
  ships:  { file: "", inline: [] }
  trucks: { file: "", inline: [] }

regions:
  - name: USA
    color: "#ff8800"
    local_origin:    { latitude: 38.0, longitude: -97.0 }
    global_position: { latitude: 38.0, longitude: -97.0 }
    networks:
      - { name: USA_rail,  type: rail,  reference_point: { x: 0, y: 0 },
          files: { nodes: "data/rail_nodes.dat", links: "data/rail_links.dat" } }
      - { name: USA_truck, type: truck, reference_point: { x: 0, y: 0 },
          files: { config: "data/truck_config.dat" } }
    linkages:    { strategy: hybrid, auto_rules: [land_terminal_to_rail_node], manual: [], exclude: [] }
    connections: { strategy: manual, auto_rules: [], manual: [], exclude: [] }

terminals:
  - id: T1
    type: "Intermodal Land Terminal"
    region: USA
    show_on_global_map: true
    position: { mode: network_node, network: USA_rail, node_id: 7 }
    properties:
      capacity: { max_capacity: 5000, critical_threshold: 0.8 }

linkages:
  - { terminal: T1, network: USA_rail, node_id: 7, source: manual, excluded: false }

connections: []

global_links: []
