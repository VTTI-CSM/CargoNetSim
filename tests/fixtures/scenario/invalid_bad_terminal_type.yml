schema_version: 1
simulation: { time_step: 60, end_time: 3600, shortest_paths_n: 5,
              time_value_of_money: 0.0, use_specific_time_values: false,
              carbon_rate: 0.0,
              multipliers: { ship: 1.0, train: 1.0, truck: 1.0 },
              ship:  { speed: 0.0, fuel_type: "", fuel_rate: 0.0, containers: 0, risk: 0.0, time_value: 0.0, use_network: true },
              train: { speed: 0.0, fuel_type: "", fuel_rate: 0.0, containers: 0, risk: 0.0, time_value: 0.0, use_network: true },
              truck: { speed: 0.0, fuel_type: "", fuel_rate: 0.0, containers: 0, risk: 0.0, time_value: 0.0, use_network: true },
              fuel_types: {},
              dwell_time: { method: normal, parameters: { mean: 1800, std_dev: 300 } } }
output: { directory: ./results, formats: [json], container_tracking: true }
fleet:  { trains: { file: "", inline: [] },
          ships:  { file: "", inline: [] },
          trucks: { file: "", inline: [] } }
regions:
  - name: USA
    color: "#ff8800"
    local_origin:    { latitude: 38.0, longitude: -97.0 }
    global_position: { latitude: 38.0, longitude: -97.0 }
    networks: []
    linkages:    { strategy: manual, auto_rules: [], manual: [], exclude: [] }
    connections: { strategy: manual, auto_rules: [], manual: [], exclude: [] }
terminals:
  - id: T1
    type: "Fictional Terminal Kind"   # <-- invalid
    region: USA
    show_on_global_map: true
    position: { mode: scene, x: 0, y: 0 }
linkages: []
connections: []
