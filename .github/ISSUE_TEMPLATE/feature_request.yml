name: Feature Request
description: Suggest an improvement or new capability for CargoNetSim.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: Describe the problem or workflow gap this request would solve.
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Describe any alternatives or workarounds you have considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, links, examples, or other context if useful.
